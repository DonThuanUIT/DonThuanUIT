name: Update GitHub Profile README

on:
  schedule:
    # Chạy vào 00:00 UTC mỗi ngày
    - cron: '0 0 * * *'
  workflow_dispatch: # Cho phép chạy thủ công từ GitHub UI

permissions:
  contents: write

jobs:
  update-readme:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore dependencies
        working-directory: ./src
        run: dotnet restore GithubProfileReadme.csproj

      - name: Build project
        working-directory: ./src
        run: dotnet build GithubProfileReadme.csproj --configuration Release --no-restore

      - name: Run application to generate profile.svg
        working-directory: ./src
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          dotnet run --project GithubProfileReadme.csproj --configuration Release --no-build

      - name: Commit and push profile.svg
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"
          
          # Kiểm tra xem profile.svg có thay đổi không
          if git diff --quiet profile.svg; then
            echo "profile.svg không có thay đổi, bỏ qua commit."
          else
            git add profile.svg
            git commit -m "chore: update profile.svg"
            git push
          fi