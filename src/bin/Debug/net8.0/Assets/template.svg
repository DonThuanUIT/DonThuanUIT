<svg width="800" height="400" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="100%" height="100%" fill="#1e1e1e"/>
  
  <!-- Header -->
  <text x="20" y="40" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#ffffff">
    Hello, I'm {USERNAME}!
  </text>
  
  <!-- Main stats Section -->
  <text x="20" y="90" font-family="Courier New, monospace" font-size="14" fill="#00ff00" xml:space="preserve">
{ASCII_ART_CONTENT}
  </text>
  
  <!-- Statistics -->
  <text x="20" y="250" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#4CAF50">
    📊 GitHub Stats
  </text>
  
  <text x="20" y="280" font-family="Arial, sans-serif" font-size="14" fill="#ffffff">
    📦 Total Repos: {TOTAL_REPOS}
  </text>
  
  <text x="20" y="305" font-family="Arial, sans-serif" font-size="14" fill="#ffffff">
    ⭐ Total Stars: {STARS}
  </text>
  
  <text x="20" y="330" font-family="Arial, sans-serif" font-size="14" fill="#ffffff">
    🔨 Commits This Year: {COMMITS_THIS_YEAR}
  </text>
  
  <text x="20" y="355" font-family="Arial, sans-serif" font-size="14" fill="#ffffff">
    💻 Top Languages: {TOP_LANGUAGES}
  </text>
  
  <!-- Footer -->
  <text x="20" y="385" font-family="Arial, sans-serif" font-size="12" fill="#888888" font-style="italic">
    Last updated: {UPDATE_TIME}
  </text>
</svg>