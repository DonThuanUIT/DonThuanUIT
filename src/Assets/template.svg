<svg width="960" height="520" xmlns="http://www.w3.org/2000/svg">

  <!-- Background -->
  <rect width="100%" height="100%" fill="#0a0a0a"/>

  <!-- Terminal window -->
  <rect x="20" y="20" width="920" height="480" rx="8" ry="8" fill="#141414" stroke="#2a2a2a" stroke-width="1"/>
  
  <!-- Title bar -->
  <rect x="20" y="20" width="920" height="32" rx="8" ry="8" fill="#1a1a1a"/>
  <rect x="20" y="36" width="920" height="16" fill="#1a1a1a"/>
  
  <!-- Window dots -->
  <circle cx="42" cy="36" r="6" fill="#ff5f57"/>
  <circle cx="60" cy="36" r="6" fill="#ffbd2e"/>
  <circle cx="78" cy="36" r="6" fill="#28c840"/>
  
  <text x="480" y="40" font-family="'Courier New', monospace" font-size="12" fill="#666" text-anchor="middle">user@github:~/profile$</text>

  <!-- ========== TERMINAL OUTPUT ========== -->

  <!-- $ whoami -->
  <text x="40" y="90" font-family="'Courier New', monospace" font-size="13" fill="#00ff00">$ whoami</text>
  <text x="40" y="110" font-family="'Courier New', monospace" font-size="14" fill="#fff" font-weight="bold">{USERNAME}</text>
  <text x="40" y="130" font-family="'Courier New', monospace" font-size="11" fill="#aaa">{BIO}</text>

  <!-- $ cat location.txt -->
  <text x="40" y="160" font-family="'Courier New', monospace" font-size="13" fill="#00ff00">$ cat location.txt</text>
  <text x="40" y="180" font-family="'Courier New', monospace" font-size="13" fill="#fff">{LOCATION}</text>

  <!-- $ echo $BLOG -->
  <text x="40" y="210" font-family="'Courier New', monospace" font-size="13" fill="#00ff00">$ echo $BLOG</text>
  <text x="40" y="230" font-family="'Courier New', monospace" font-size="13" fill="#58a6ff">{BLOG}</text>

  <!-- $ curl -s https://api.github.com/users/{USERNAME}/stats -->
  <text x="40" y="260" font-family="'Courier New', monospace" font-size="13" fill="#00ff00">$ curl -s https://api.github.com/users/{USERNAME}/stats</text>
  <text x="40" y="280" font-family="'Courier New', monospace" font-size="13" fill="#fff">  Repos:      {TOTAL_REPOS}</text>
  <text x="40" y="298" font-family="'Courier New', monospace" font-size="13" fill="#fff">  Stars:      {STARS}</text>
  <text x="40" y="316" font-family="'Courier New', monospace" font-size="13" fill="#fff">  Commits:    {COMMITS_THIS_YEAR}</text>
  <text x="40" y="334" font-family="'Courier New', monospace" font-size="13" fill="#fff">  Followers:  {FOLLOWERS}</text>
  <text x="40" y="352" font-family="'Courier New', monospace" font-size="13" fill="#fff">  Following:  {FOLLOWING}</text>

  <!-- $ languages --list -->
  <text x="40" y="382" font-family="'Courier New', monospace" font-size="13" fill="#00ff00">$ languages --list</text>
  <text x="40" y="402" font-family="'Courier New', monospace" font-size="13" fill="#fff">{TOP_LANGUAGES}</text>

  <!-- $ gh pr list --merged --count -->
  <text x="40" y="432" font-family="'Courier New', monospace" font-size="13" fill="#00ff00">$ gh pr list --merged --count</text>
  <text x="40" y="452" font-family="'Courier New', monospace" font-size="13" fill="#fff">  Pull Requests: {TOTAL_PULL_REQUESTS} | Issues: {TOTAL_ISSUES}</text>

  <!-- Footer -->
  <rect x="20" y="468" width="920" height="32" fill="#1a1a1a"/>
  <text x="40" y="490" font-family="'Courier New', monospace" font-size="11" fill="#555">Last update: {UPDATE_TIME}</text>
  <text x="920" y="490" font-family="'Courier New', monospace" font-size="11" fill="#555" text-anchor="end">~/profile.sh</text>

</svg>