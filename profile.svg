<svg width="960" height="620" xmlns="http://www.w3.org/2000/svg">

  <!-- Background -->
  <rect width="100%" height="100%" fill="#0a0a0a"/>

  <!-- Terminal window -->
  <rect x="20" y="20" width="920" height="580" rx="8" ry="8" fill="#141414" stroke="#2a2a2a" stroke-width="1"/>
  
  <!-- Title bar -->
  <rect x="20" y="20" width="920" height="32" rx="8" ry="8" fill="#1a1a1a"/>
  <rect x="20" y="36" width="920" height="16" fill="#1a1a1a"/>
  
  <!-- Window dots -->
  <circle cx="42" cy="36" r="6" fill="#ff5f57"/>
  <circle cx="60" cy="36" r="6" fill="#ffbd2e"/>
  <circle cx="78" cy="36" r="6" fill="#28c840"/>
  
  <text x="480" y="40" font-family="'Courier New', monospace" font-size="12" fill="#666" text-anchor="middle">user@github:~/profile$</text>

  <!-- ========== LEFT COLUMN ========== -->
  <!-- Profile Info -->
  <text x="50" y="90" font-family="'Courier New', monospace" font-size="13" fill="#00ff00">[root@github ~]# whoami</text>
  <text x="50" y="112" font-family="'Courier New', monospace" font-size="14" fill="#fff" font-weight="bold">DonThuanUIT</text>
  <text x="50" y="132" font-family="'Courier New', monospace" font-size="11" fill="#aaa"></text>

  <text x="50" y="165" font-family="'Courier New', monospace" font-size="12" fill="#00ff00">[root@github ~]# cat location.txt</text>
  <text x="50" y="185" font-family="'Courier New', monospace" font-size="13" fill="#fff"></text>

  <text x="50" y="218" font-family="'Courier New', monospace" font-size="12" fill="#00ff00">[root@github ~]# echo $BLOG</text>
  <text x="50" y="238" font-family="'Courier New', monospace" font-size="13" fill="#58a6ff"></text>

  <!-- Stats section -->
  <text x="50" y="275" font-family="'Courier New', monospace" font-size="12" fill="#00ff00">[root@github ~]# curl --stats</text>
  <text x="50" y="295" font-family="'Courier New', monospace" font-size="13" fill="#fff">Repositories: 8</text>
  <text x="50" y="315" font-family="'Courier New', monospace" font-size="13" fill="#fff">Stars:        2</text>
  <text x="50" y="335" font-family="'Courier New', monospace" font-size="13" fill="#fff">Commits:      40</text>

  <text x="50" y="372" font-family="'Courier New', monospace" font-size="12" fill="#00ff00">[root@github ~]# curl --social</text>
  <text x="50" y="392" font-family="'Courier New', monospace" font-size="13" fill="#fff">Followers:    0</text>
  <text x="50" y="412" font-family="'Courier New', monospace" font-size="13" fill="#fff">Following:    1</text>

  <!-- ========== RIGHT COLUMN ========== -->
  <text x="490" y="90" font-family="'Courier New', monospace" font-size="12" fill="#00ff00">[root@github ~]# languages --list</text>
  <text x="490" y="112" font-family="'Courier New', monospace" font-size="13" fill="#fff">Java, C#, HTML</text>

  <text x="490" y="152" font-family="'Courier New', monospace" font-size="12" fill="#00ff00">[root@github ~]# repos pr --merged</text>
  <text x="490" y="172" font-family="'Courier New', monospace" font-size="13" fill="#fff">Pull Requests: 0</text>

  <text x="490" y="212" font-family="'Courier New', monospace" font-size="12" fill="#00ff00">[root@github ~]# issues --resolved</text>
