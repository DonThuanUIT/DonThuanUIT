  <text x="490" y="350" font-family="'Courier New', monospace" font-size="10" fill="#fff">▄▄▄▄▄▄▄█▄▄▄▄▄▄▄▄▄▄▄▄▄▄▄▄▄█▄▄▄▄▄▄▄█▄▄▄▄▄▄</text>
  <text x="490" y="365" font-family="'Courier New', monospace" font-size="10" fill="#fff">▄▄▄▄▄▄▄█▄▄▄▄▄▄▄▄▄▄▄▄▄▄▄▄▄█▄▄▄▄▄▄▄█▄▄▄▄▄▄</text>
  <text x="490" y="380" font-family="'Courier New', monospace" font-size="10" fill="#fff">▄▄▄▄▄▄▄█▄▄▄▄▄▄▄▄▄▄▄▄▄▄▄▄▄█▄▄▄▄▄▄▄█▄▄▄▄▄▄</text>
  <text x="490" y="395" font-family="'Courier New', monospace" font-size="10" fill="#fff">▄▄▄▄▄▄▄▄▄▄▄▄▄▄▄▄▄▄▄▄▄▄▄▄▄▄▄▄▄▄▄▄▄▄▄▄▄▄▄▄</text>

  <!-- Neofetch-style system info box -->
  <rect x="490" y="420" width="420" height="105" rx="4" ry="4" fill="#1a1a2e" stroke="#333" stroke-width="1"/>
  <text x="500" y="440" font-family="'Courier New', monospace" font-size="12" fill="#00ff00">[root@github ~]# neofetch</text>
  <text x="500" y="460" font-family="'Courier New', monospace" font-size="11" fill="#888">OS:        DonThuanProfile v1.0</text>
  <text x="500" y="478" font-family="'Courier New', monospace" font-size="11" fill="#888">Uptime:    7+ years coding</text>
  <text x="500" y="496" font-family="'Courier New', monospace" font-size="11" fill="#888">Shell:     README.md</text>
  <text x="500" y="514" font-family="'Courier New', monospace" font-size="11" fill="#888">Theme:     Dark Terminal</text>

  <!-- Footer -->
  <rect x="20" y="568" width="920" height="32" fill="#1a1a1a"/>
  <text x="40" y="588" font-family="'Courier New', monospace" font-size="11" fill="#555">Last update: 2026-07-24 11:18 UTC</text>
  <text x="920" y="588" font-family="'Courier New', monospace" font-size="11" fill="#555" text-anchor="end">profile.sh</text>

